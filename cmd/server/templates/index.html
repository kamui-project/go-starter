<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Go Starter</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta property="og:image" content="/static/og.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #17161c; color: #ffffff; line-height: 1.6; }
        a { color: #c2c7e0; }
        nav { background-color: #17161c; padding: 1rem 2rem; border-bottom: 1px solid #272a3c; }
        nav a { color: #c2c7e0; text-decoration: none; margin-right: 1.5rem; font-weight: 500; }
        nav a:hover { color: #ffffff; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1rem; color: #ffffff; }
        .card { background: #1e2130; border: 1px solid #272a3c; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px 1px rgba(0,0,0,0.1), 0 1px 5px 0 rgba(0,0,0,0.3); }
        ul { list-style: none; }
        ul li { padding: 0.75rem 0; border-bottom: 1px solid #272a3c; }
        ul li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/greetings">Greetings</a>
    </nav>
    <div class="container">
        <div style="text-align: center; padding: 3rem 1rem;">
            <img src="/static/og.png" alt="Go Starter" style="max-width: 320px; border-radius: 4px; margin-bottom: 2rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Welcome to Go Starter</h1>
            <p style="color: #696f8c; font-size: 1.1rem; margin-bottom: 2.5rem;">Your Gin app is up and running on Kamui Platform.</p>
            <div class="card" style="display: inline-block; text-align: left; width: 100%; max-width: 500px;">
                <h2 style="font-size: 1.1rem; margin-bottom: 1rem;">Next Steps</h2>
                <ul style="list-style: none;">
                    <li style="padding: 0.6rem 0; border-bottom: 1px solid #272a3c;">
                        <span style="color: #00e7ad; margin-right: 0.5rem;">&#10003;</span> App deployed successfully
                    </li>
                    <li style="padding: 0.6rem 0; border-bottom: 1px solid #272a3c;">
                        <span style="color: #00e7ad; margin-right: 0.5rem;">&#10003;</span> Database connected
                    </li>
                    <li style="padding: 0.6rem 0;">
                        <span style="color: #696f8c; margin-right: 0.5rem;">&#9656;</span>
                        <a href="/greetings" style="color: #ffffff;">Try the Greetings page</a>
                    </li>
                </ul>
            </div>
            <div style="margin-top: 2rem;">
                <a href="/greetings" style="display: inline-block; padding: 0.75rem 2rem; background-color: #d91a01; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 1.1rem; font-weight: 500; transition: background-color 0.2s;">Get Started</a>
            </div>
        </div>
    </div>
</body>
</html>
